name: Test, Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  test_build_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

# Teste unitário

      - name: Use Node.js 14.x
        uses: actions/setup-node@v2
        with:
          node-version: 14.x

      - name: Install dependencies
        run: npm install express jest

      - name: Teste unitário
        run: npm test

# Build

      - name: Install express, webpack and webpack-cli
        run: npm install express webpack webpack-cli --save-dev

      - name: Build
        run: npm run build

      # Deploy to Azure VM
      - name: Deploy to Azure VM
        uses: appleboy/scp-action@master
        with:
          host: azure
          username: ${{ secrets.SSH_USERNAME }}  # Adicione o nome de usuário SSH como uma secret
          key: ${{ secrets.SSH_PRIVATE_KEY }}    # Adicione a chave SSH como uma secret
          port: 22
          source: "./src"  # Diretório local contendo os arquivos a serem copiados
          target: "/home/user/app"                # Diretório remoto onde os arquivos serão copiados
